<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mama's Daily Generator</title>
  <style>
    :root {
      --gold: #c9913a; --gold-lt: #f0c97a;
      --purple: #7b4f9e; --purple-lt: #a87bc8;
      --rose: #d4748c; --warm: #fdf3e7;
      --card-bg: #fffdf8; --text: #3d2a1a;
      --muted: #7a5c44; --border: rgba(201,145,58,0.25);
      --shadow: rgba(123,79,158,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: var(--warm); color: var(--text); min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #4a2060 0%, #7b4f9e 50%, #c9913a 100%);
      padding: 2.5rem 1rem 3rem; text-align: center;
    }
    .lotus { font-size: 3rem; margin-bottom: 0.5rem; }
    header h1 { font-size: clamp(1.8rem,5vw,2.8rem); color: #fff; font-weight: normal; letter-spacing: 0.04em; text-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    header p.subtitle { color: rgba(255,255,255,0.82); font-style: italic; margin-top: 0.4rem; font-size: 1.05rem; }
    #date-display {
      display: inline-block; margin-top: 1rem;
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 30px; padding: 0.35rem 1.2rem; color: #fff; font-size: 0.9rem; letter-spacing: 0.06em;
    }

    main { max-width: 880px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    .cards-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
    @media (min-width: 640px) { .cards-grid { grid-template-columns: 1fr 1fr; } }

    .card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 1.6rem 1.5rem;
      box-shadow: 0 4px 24px var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s ease both;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(123,79,158,0.15); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .card:nth-child(1){animation-delay:.05s} .card:nth-child(2){animation-delay:.15s}
    .card:nth-child(3){animation-delay:.25s} .card:nth-child(4){animation-delay:.35s}
    .card:nth-child(5){animation-delay:.45s}

    .kindness-person { font-size: 1rem; font-weight: bold; color: var(--purple); margin-bottom: 0.2rem; }
    .kindness-relation { font-size: 0.75rem; font-family: Arial,sans-serif; color: var(--rose); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
    .kindness-action { font-size: 0.97rem; color: var(--muted); line-height: 1.65; }

    .card-icon { font-size: 2rem; margin-bottom: 0.6rem; display: block; }
    .card-label { font-size: 0.7rem; font-family: Arial, sans-serif; letter-spacing: 0.14em; text-transform: uppercase; color: var(--purple); font-weight: 600; margin-bottom: 0.3rem; }
    .card h2 { font-size: 1.25rem; font-weight: normal; line-height: 1.3; margin-bottom: 0.15rem; }
    .card .composer { font-size: 0.85rem; color: var(--gold); font-style: italic; margin-bottom: 0.75rem; }
    .card p { font-size: 0.97rem; color: var(--muted); line-height: 1.65; margin-bottom: 0.6rem; }
    .card p:last-child { margin-bottom: 0; }

    .badge { display: inline-block; background: linear-gradient(135deg,var(--purple),var(--purple-lt)); color: #fff; font-size: 0.75rem; font-family: Arial,sans-serif; padding: 0.25rem 0.8rem; border-radius: 20px; margin-bottom: 0.75rem; }
    .mood-badge { display: inline-block; background: linear-gradient(135deg,var(--gold),var(--gold-lt)); color: var(--text); font-size: 0.75rem; font-family: Arial,sans-serif; padding: 0.25rem 0.8rem; border-radius: 20px; margin-bottom: 0.75rem; }
    .loc-badge { display: inline-block; background: linear-gradient(135deg,var(--rose),#e8a0b0); color: #fff; font-size: 0.75rem; font-family: Arial,sans-serif; padding: 0.25rem 0.8rem; border-radius: 20px; margin-bottom: 0.75rem; }

    .card.quote-card { background: linear-gradient(135deg,#fdf8f0,#f5eaf8); border-color: rgba(123,79,158,0.2); text-align: center; }
    .quote-card blockquote { font-size: 1.12rem; font-style: italic; line-height: 1.75; padding: 0.5rem 1rem; border-left: 3px solid var(--gold); text-align: left; margin: 0.75rem 0 1rem; }
    .quote-card .attribution { font-size: 0.85rem; color: var(--purple); letter-spacing: 0.06em; font-family: Arial,sans-serif; margin-bottom: 1rem; }
    .divider { height: 1px; background: linear-gradient(to right,transparent,var(--border),transparent); margin: 0.75rem 0; }

    .tip-box { background: rgba(201,145,58,0.08); border: 1px solid rgba(201,145,58,0.2); border-radius: 10px; padding: 0.65rem 1rem; font-size: 0.88rem; color: var(--muted); font-style: italic; margin-top: 0.5rem; }
    .tip-box strong { color: var(--gold); font-style: normal; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 0.2rem; }

    footer { text-align: center; padding: 1.5rem; color: var(--muted); font-size: 0.82rem; font-style: italic; opacity: 0.75; }
  </style>
</head>
<body>

<header>
  <div class="lotus">🪷</div>
  <h1>Mama's Daily Generator</h1>
  <p class="subtitle">Meditations, music, wonders &amp; wisdom — just for you</p>
  <div id="date-display"></div>
</header>

<main>
  <div class="cards-grid">

    <div class="card">
      <span class="card-icon">🧘</span>
      <div class="card-label">Today's Meditation</div>
      <h2 id="med-title"></h2>
      <div id="med-badge"></div>
      <p id="med-desc"></p>
      <div class="tip-box"><strong>Gentle Tip</strong><span id="med-tip"></span></div>
    </div>

    <div class="card">
      <span class="card-icon">🎹</span>
      <div class="card-label">Classical Piano</div>
      <h2 id="piano-title"></h2>
      <div class="composer" id="piano-composer"></div>
      <div id="piano-mood"></div>
      <p id="piano-desc"></p>
    </div>

    <div class="card">
      <span class="card-icon" id="fact-emoji"></span>
      <div class="card-label">Fun Fact of the Day</div>
      <div id="fact-loc"></div>
      <p id="fact-text"></p>
    </div>

    <div class="card quote-card">
      <span class="card-icon">✨</span>
      <div class="card-label">Daily Wisdom from Yogananda</div>
      <blockquote id="quote-text"></blockquote>
      <div class="attribution">— Paramahansa Yogananda</div>
      <div class="divider"></div>
      <p id="quote-reflection"></p>
    </div>

    <div class="card">
      <span class="card-icon">💝</span>
      <div class="card-label">Today's Act of Kindness</div>
      <div class="kindness-person" id="kind-name"></div>
      <div class="kindness-relation" id="kind-relation"></div>
      <p class="kindness-action" id="kind-action"></p>
    </div>

  </div>
</main>

<footer>Made with love &amp; a little magic &nbsp;🌸</footer>

<script>
const meditations = [
  { title:"Loving-Kindness (Metta) Meditation", duration:"15 min", desc:"Begin by sending warmth and love to yourself, then gently extend that circle of kindness to your family, friends, and all beings. This ancient practice softens the heart and fills you with a quiet, radiant joy that lingers all day.", tip:"Place one hand over your heart as you practice — the warmth reminds you to be gentle with yourself first." },
  { title:"Body Scan for Deep Relaxation", duration:"20 min", desc:"Starting at the crown of your head, slowly travel your awareness down through every part of your body, releasing any tension you find along the way. By the time you reach your toes, you'll feel like you're floating on a warm cloud.", tip:"If your mind wanders, simply notice it with a smile and return to wherever you left off in your body." },
  { title:"Breath Awareness Meditation", duration:"10 min", desc:"Simply watch the natural rhythm of your breath — the gentle rise and fall — without trying to change it. This deceptively simple practice anchors you in the present moment and brings a profound sense of peace.", tip:"Count your exhales from 1 to 10, then start again. If you lose count, that's perfectly fine — just begin at 1." },
  { title:"Visualization: Walk in a Peaceful Garden", duration:"15 min", desc:"Close your eyes and imagine yourself walking slowly through a beautiful garden in golden afternoon light. Feel the soft grass beneath your feet, smell the flowers, and let the serenity of this inner sanctuary restore your spirit.", tip:"Make the details as vivid as possible — colors, scents, the warmth of sunlight on your skin." },
  { title:"Gratitude Meditation", duration:"12 min", desc:"Rest in stillness and let three things you're grateful for arise naturally in your awareness. Sit with each one fully, letting the feeling of thankfulness fill your chest like warm light. This practice is a direct path to happiness.", tip:"End by giving thanks for your own life and the gift of this quiet moment." },
  { title:"Candle Flame Trataka (Gazing Meditation)", duration:"10 min", desc:"Gently gaze at a candle flame without blinking for as long as comfortable, then close your eyes and hold the image in your mind's eye. This ancient yogic technique strengthens concentration and brings deep inner calm.", tip:"Sit about two feet from the candle, at eye level, in a room without drafts." },
  { title:"Ocean Breath (Ujjayi) Meditation", duration:"15 min", desc:"Breathe slowly through your nose with a soft constriction in the back of your throat, creating a gentle sound like ocean waves. This soothing breath warms the body, steadies the mind, and carries you into a meditative state.", tip:"The sound of your breath is your anchor — whenever thoughts arise, let the ocean waves guide you back." },
  { title:"Walking Meditation in Nature", duration:"20 min", desc:"Step outside and walk very slowly, feeling each footfall with full awareness. Let your senses open to the sounds of birds, the touch of the breeze, the colors around you. Nature has a remarkable way of healing and restoring.", tip:"Leave your phone inside. Let this be a true gift of undivided presence to yourself and the world around you." },
  { title:"Heart Chakra Opening Meditation", duration:"15 min", desc:"Breathe gently into the center of your chest and imagine a soft emerald-green light growing there with each inhale. Feel it expand outward in all directions, dissolving any tightness or sadness, filling you with warmth and compassion.", tip:"You can softly hum the sound 'YAM' on each exhale — it is the seed mantra of the heart center." },
  { title:"Yoga Nidra (Yogic Sleep)", duration:"30 min", desc:"Lie down comfortably and follow a gentle rotation of awareness through different parts of your body, then through pairs of opposite sensations. You hover between waking and sleep in a state of profound, healing rest.", tip:"Even if you fall asleep, your subconscious continues to absorb the practice. There is no wrong way to do Yoga Nidra." },
  { title:"So Hum Mantra Meditation", duration:"15 min", desc:"With eyes closed, silently repeat 'So' on the inhale and 'Hum' on the exhale — an ancient Sanskrit mantra meaning 'I am that.' This practice connects you to the vast, peaceful awareness that is your truest nature.", tip:"Don't force the mantra to match your breath perfectly. Let both be natural and easy." },
  { title:"Mindful Listening Meditation", duration:"10 min", desc:"Sit quietly and open your ears to all the sounds around you — near and far, pleasant and neutral — without labeling or judging them. Simply receive them like music. This practice reveals how much peace is available in any ordinary moment.", tip:"Begin with eyes closed, then gently open them halfway and notice how sight and sound together create a rich tapestry of presence." },
  { title:"Inner Smile Meditation", duration:"12 min", desc:"Bring a gentle, soft smile to your face and then, imaginatively, smile into your heart, your stomach, your lungs — sending warmth and kindness to each organ. This beautiful Taoist practice fills you with a quiet, glowing happiness.", tip:"Imagine your inner organs smiling back at you. Your body is your faithful companion and deserves your love." },
  { title:"Sunset Visualization Meditation", duration:"15 min", desc:"Close your eyes and picture yourself sitting peacefully watching a magnificent sunset over the ocean. Watch the colors shift — rose gold, deep orange, violet — as the sun descends. Let the day's worries dissolve with the light.", tip:"Stay with the image of the dark, star-filled sky that follows. Rest in the vastness and feel how held you are." },
  { title:"Crystal Bowl Sound Meditation", duration:"20 min", desc:"Imagine (or play) the resonant tones of crystal singing bowls and let the sound vibrations move through your body. Each tone corresponds to a different energy center, gently clearing and balancing your whole being.", tip:"You can find crystal bowl recordings on YouTube or Spotify — simply lie down, close your eyes, and let the sound do the work." },
  { title:"Forgiveness Meditation", duration:"15 min", desc:"Gently bring to mind anyone — including yourself — toward whom you carry any heaviness. Silently offer the phrase 'I forgive you. I release this. I wish you peace.' Forgiveness is the most powerful gift you can give your own heart.", tip:"This practice may feel hard at first. Be very patient and gentle. Even a small opening is enough." },
  { title:"Morning Sun Salutation Meditation", duration:"10 min", desc:"Stand facing the rising sun (or simply face east) and breathe deeply. With each inhale, imagine drawing golden light into your body; with each exhale, let it radiate out through your skin. Greet the new day as a gift.", tip:"Place both palms together at your heart in a prayer gesture and offer one sincere intention for the day ahead." },
  { title:"Chakra Balancing Meditation", duration:"20 min", desc:"Journey from the base of your spine to the crown of your head, pausing at each of the seven energy centers. Breathe light into each one, noticing any areas that feel tight or dim, and gently invite them to open and brighten.", tip:"Start from the root (red, earth, stability) and work upward. Move at whatever pace feels right for you today." },
  { title:"Mudra Meditation with Gyan Mudra", duration:"10 min", desc:"Sit comfortably with the tips of your thumbs and index fingers touching, hands resting on your knees, and simply breathe. This classic hand position — the gesture of wisdom — naturally quiets the mind and invites clarity.", tip:"Notice how even this small gesture shifts the quality of your awareness. The body is full of hidden wisdom." },
  { title:"Mountain Meditation", duration:"15 min", desc:"Imagine yourself as an ancient, immovable mountain. Seasons change, storms come and go, but you remain serene and solid at your core. This powerful practice builds an unshakeable sense of inner stability and calm.", tip:"When you open your eyes, carry the mountain with you. You can return to this steadiness in any difficult moment." },
];

const piano = [
  { title:"Clair de Lune", composer:"Claude Debussy", mood:"Dreamy & luminous", desc:"This timeless piece floats like moonlight on still water, carrying you gently into a world of pure beauty. Its liquid, shimmering notes have a way of making everything feel soft and wonderfully quiet." },
  { title:"Gymnopédie No. 1", composer:"Erik Satie", mood:"Tender & unhurried", desc:"Satie wrote this as an invitation to slow down and simply be. Its unhurried, gentle melody wraps around you like a warm shawl and reminds you that stillness is its own form of joy." },
  { title:"Nocturne in E-flat major, Op. 9 No. 2", composer:"Frédéric Chopin", mood:"Romantic & serene", desc:"Chopin's most beloved nocturne sings a lullaby to the soul. Its singing melody and tender ornamentation feel like a love letter written in pure sound — perfect for a quiet, reflective evening." },
  { title:"Für Elise", composer:"Ludwig van Beethoven", mood:"Gentle & wistful", desc:"Even after two centuries, this little piece still feels like a secret between you and Beethoven. Its delicate, lilting theme has an almost magical ability to bring a smile to the face and peace to the heart." },
  { title:"Liebestraum No. 3", composer:"Franz Liszt", mood:"Warm & passionate", desc:"'Liebestraum' means 'Dream of Love,' and Liszt meant every note of it. This sweeping, tender piece rises and falls like a long embrace, leaving you feeling both moved and somehow more alive." },
  { title:"Prelude in C Major, BWV 846", composer:"Johann Sebastian Bach", mood:"Clear & meditative", desc:"Bach built this pure, flowing prelude from a simple idea, and its unhurried arpeggios feel like sunlight rippling across water. It has a quality of absolute clarity and peace that few pieces can match." },
  { title:"Moonlight Sonata, 1st Movement", composer:"Ludwig van Beethoven", mood:"Contemplative & deep", desc:"Written in the quiet hours of the night, this movement moves with the slow, steady pulse of moonlight reflected in dark water. It invites you into a depth of feeling that is both moving and strangely comforting." },
  { title:"Ballade No. 1 in G minor", composer:"Frédéric Chopin", mood:"Dramatic & storytelling", desc:"Chopin pours an entire novel into this single piece — longing, tenderness, urgency, and breathtaking beauty. Listening to it feels like being swept up in a magnificent, bittersweet dream." },
  { title:"Kinderszenen: Träumerei", composer:"Robert Schumann", mood:"Sweet & nostalgic", desc:"'Träumerei' means 'Dreaming,' and this brief, perfect piece does exactly that — it dreams tenderly of childhood innocence and simple happiness. It always manages to touch something very deep." },
  { title:"Arabesque No. 1", composer:"Claude Debussy", mood:"Playful & flowing", desc:"Light and graceful as a butterfly, this early Debussy piece dances through major and minor modes with effortless charm. It will lift your spirits and fill the room with a sense of gentle, natural beauty." },
  { title:"Golliwogg's Cakewalk", composer:"Claude Debussy", mood:"Joyful & whimsical", desc:"Pure musical delight — Debussy wrote this for his daughter, and it still brims with the same playful joy today. Its bouncy rhythms and funny little quotations are guaranteed to make you smile." },
  { title:"Rondo alla Turca (Turkish March)", composer:"Wolfgang Amadeus Mozart", mood:"Bright & energetic", desc:"Mozart at his most sparkling and irresistible. This jubilant march bounces along with such infectious good humor that it's nearly impossible not to feel your spirits lifted immediately." },
  { title:"Piano Sonata No. 16 in C major, K. 545", composer:"Wolfgang Amadeus Mozart", mood:"Pure & cheerful", desc:"Mozart called this 'for beginners,' but its elegant simplicity is actually the product of supreme mastery. Its sunny, uncomplicated joy is the perfect soundtrack for a beautiful, ordinary day." },
  { title:"The Well-Tempered Clavier: Prelude No. 2", composer:"Johann Sebastian Bach", mood:"Curious & intricate", desc:"This quicksilver prelude dances with an irresistible, almost mischievous energy. Bach's fingers seem to be chasing something delightful just around the corner, and you find yourself happily following along." },
  { title:"Waltz in A minor, B. 150", composer:"Frédéric Chopin", mood:"Gentle & bittersweet", desc:"This small, unpretentious waltz has a quiet honesty that is deeply touching. Chopin seems to be speaking directly to you — softly, without pretense — about the beauty and sadness woven into everyday life." },
  { title:"Impromptu in A-flat major, Op. 90 No. 4", composer:"Franz Schubert", mood:"Brilliant & warm", desc:"Schubert's fingers fly over the keyboard in this shimmering tour de force, yet underneath the dazzling surface lies a melody of heartbreaking sweetness. It is both exhilarating and profoundly human." },
  { title:"Fantasy Impromptu, Op. 66", composer:"Frédéric Chopin", mood:"Dramatic & tender", desc:"A breathtaking contrast between stormy outer sections and a singing, heartfelt middle melody. That central theme is one of the most beautiful things ever written — pure Chopin, pure emotion, pure grace." },
  { title:"Consolation No. 3 in D-flat major", composer:"Franz Liszt", mood:"Soothing & celestial", desc:"Liszt composed his Consolations as musical balm for the soul, and this third one is the most beloved — a slowly unfolding hymn of extraordinary tenderness that seems to come from another, gentler world." },
  { title:"Allegro in B-flat major, K. 3", composer:"Wolfgang Amadeus Mozart", mood:"Bright & innocent", desc:"Mozart wrote this at age six — SIX — and even here you can hear the boundless joy and natural elegance that would define his whole life. It is music as pure as a child's laughter." },
  { title:"Evening Prayer (Hänsel und Gretel)", composer:"Engelbert Humperdinck (arr. for piano)", mood:"Peaceful & devotional", desc:"This simple, heart-melting melody from Humperdinck's fairy-tale opera has all the warmth of a mother's goodnight kiss. Listening to it at the end of the day brings a wonderful sense of protection and peace." },
];

  { loc:"Germany", emoji:"🇩🇪🏰", text:"Germany is home to over 20,000 castles and castle ruins — more than any other country in the world. Many sit hidden in forested hills along the Rhine and Mosel rivers, like something straight out of a fairy tale." },

  { loc:"Miami", emoji:"🌊🐬", text:"Biscayne Bay, right at Miami's doorstep, is home to a remarkable population of bottlenose dolphins. On any given boat ride, you're very likely to see them playing in the wake — Miami's most joyful permanent residents." },
  { loc:"Germany", emoji:"🇩🇪🌲", text:"The Black Forest (Schwarzwald) inspired the Brothers Grimm fairy tales — it really is that beautiful and ancient. Today it's also famous for the world's highest density of cuckoo clocks, with some workshops making pieces that take months to complete." },

  { loc:"Germany", emoji:"🇩🇪🍺", text:"The Bavarian Beer Purity Law (Reinheitsgebot) of 1516 is one of the oldest food-safety regulations still in use anywhere in the world. It originally specified that beer could only be made from water, barley, and hops — nothing else." },

function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000);
}

function pick(arr, offset) {
  const d = new Date();
  return arr[(dayOfYear(d) + offset) % arr.length];
}

function init() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  document.getElementById('date-display').textContent = dateStr;

  const m = pick(meditations, 0);
  document.getElementById('med-title').textContent = m.title;
  document.getElementById('med-badge').innerHTML = `<span class="badge">⏱ ${m.duration}</span>`;
  document.getElementById('med-desc').textContent = m.desc;
  document.getElementById('med-tip').textContent = m.tip;

  const p = pick(piano, 7);
  document.getElementById('piano-title').textContent = p.title;
  document.getElementById('piano-composer').textContent = p.composer;
  document.getElementById('piano-mood').innerHTML = `<span class="mood-badge">${p.mood}</span>`;
  document.getElementById('piano-desc').textContent = p.desc;

  const f = pick(facts, 13);
  document.getElementById('fact-emoji').textContent = f.emoji;
  document.getElementById('fact-loc').innerHTML = `<span class="loc-badge">📍 ${f.loc}</span>`;
  document.getElementById('fact-text').textContent = f.text;

  const q = pick(quotes, 19);
  document.getElementById('quote-text').textContent = `"${q.quote}"`;
  document.getElementById('quote-reflection').textContent = q.reflection;

  const person = family[dayOfYear(new Date()) % family.length];
  const act = person.acts[Math.floor(dayOfYear(new Date()) / family.length) % person.acts.length];
  document.getElementById('kind-name').textContent = `${person.emoji}  ${person.name}`;
  document.getElementById('kind-relation').textContent = person.relation;
  document.getElementById('kind-action').textContent = act;
}
